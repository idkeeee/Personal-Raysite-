<!DOCTYPE html>

<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <!-- Make all relative links resolve from your repo root 
         ya gotta do this one cuz... git stuff idk... -->
        <base href="https://idkeeee.github.io/Personal-Raysite-/">

        <title> 🔥 </title>  
        <link rel="stylesheet" href="css/navbar.css?v=3">
        <link rel="stylesheet" href="css/sidebar.css?v=3">
        <link rel="stylesheet" href="css/general_styles.css?v=3">
        <link rel="stylesheet" href="css/cards.css?v=3">
        <link rel="stylesheet" href="css/cards/calender.css?v=1">
    </head>

    <body>
        <!-- Navbar ⬆️ -->
         <nav class="navbar">
            <div class="hamburger" onclick="toggleMenu()">&#9776;</div>
            <div class="ray_title"> <!-- the title is in navbar.css --></div>                 <!-- title -->
        </nav>

        <!-- Sidebar ⬅️ -->
         <aside class="side_menu" id="sideMenu" aria-hidden="true">
            <button class="side_menu-close-button" aria-label="Close" onclick="toggleMenu()">x</button> <!-- close button -->
        </aside>
        <div class="backdrop" id="menuBackdrop" onclick="toggleMenu()"></div>   <!-- darkens page when sidemenu opens , in generals.js -->


    <main class="calendar_page">
        <section class="calendar_card">

            <div class="calendar_header">
                <div class="calendar_title_row">
                    <div class="calendar_heading">
                        <h1>Calendar</h1>
                        <p>Plan tasks, events, and reminders</p>
                    </div>

                    <div class="calendar_header_actions">
                        <button id="jumpTodayBtn" class="calendar_action_btn" type="button">Today</button>
                        <button id="prevActivityBtn" class="calendar_action_btn" type="button">Last Activity</button>
                        <button id="nextActivityBtn" class="calendar_action_btn" type="button">Next Activity</button>
                    </div>
                </div>
            </div>

            <div id="calendarScroll" class="calendar_scroll">
                <!-- JS will generate months here -->
            </div>

        </section>
    </main>


        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="js/cards/calender.js"></script>
        <script src="js/generals.js"></script>
        <script src="js/navbar.js"></script>
    </body>

</html>
